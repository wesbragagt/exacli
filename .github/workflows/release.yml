name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            os: linux
            arch: x64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            os: linux
            arch: arm64
            ext: ""
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            os: linux
            arch: x64-musl
            ext: ""
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64-musl
            os: linux
            arch: arm64-musl
            ext: ""
          - runner: ubuntu-latest
            target: bun-darwin-x64
            os: darwin
            arch: x64
            ext: ""
          - runner: macos-15
            target: bun-darwin-arm64
            os: darwin
            arch: arm64
            ext: ""
          - runner: ubuntu-latest
            target: bun-windows-x64
            os: windows
            arch: x64
            ext: ".exe"
          - runner: ubuntu-latest
            target: bun-windows-arm64
            os: windows
            arch: arm64
            ext: ".exe"
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for CI to complete for commit $COMMIT_SHA..."
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --repo "$REPO" \
              --commit "$COMMIT_SHA" \
              --workflow "CI" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "$RUN_ID" ]; then
              break
            fi
            echo "CI run not found yet (attempt $i/20). Waiting 15s..."
            sleep 15
          done
          if [ -z "$RUN_ID" ]; then
            echo "No CI run found for commit $COMMIT_SHA. Aborting release."
            exit 1
          fi
          gh run watch "$RUN_ID" --repo "$REPO" --exit-status

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env

      - name: Compile binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile exacli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: exacli-${{ matrix.os }}-${{ matrix.arch }}
          path: exacli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release create "$TAG_NAME" artifacts/* --generate-notes --repo "$REPO"
