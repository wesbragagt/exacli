name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            platform: linux-x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            platform: linux-arm64
          - runner: ubuntu-latest
            target: bun-darwin-x64
            platform: darwin-x64
          - runner: macos-15
            target: bun-darwin-arm64
            platform: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI to complete for commit ${{ github.sha }}..."
          for i in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --commit "${{ github.sha }}" \
              --workflow "CI" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "$RUN_ID" ]; then
              break
            fi
            echo "CI run not found yet (attempt $i/20). Waiting 15s..."
            sleep 15
          done
          if [ -z "$RUN_ID" ]; then
            echo "No CI run found for commit ${{ github.sha }}. Aborting release."
            exit 1
          fi
          gh run watch "$RUN_ID" --repo "${{ github.repository }}" --exit-status

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile dist/exacli-${{ matrix.platform }}
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: exacli-${{ matrix.platform }}
          path: dist/exacli-${{ matrix.platform }}
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: artifacts/*
